<!DOCTYPE html>
<html lang="en">
<head>
<title>The Lab</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%); color: #fff; font-family: monospace; padding: 20px; }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { font-size: 3em; background: linear-gradient(45deg, #00ff88, #00cc6a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
.card { background: rgba(0,0,0,0.7); border: 1px solid #00ff88; border-radius: 10px; padding: 20px; text-align: center; transition: transform 0.3s; }
.card:hover { transform: scale(1.05); box-shadow: 0 0 20px #00ff88; }
.card h3 { color: #00ff88; margin-bottom: 10px; }
.card .value { font-size: 2em; font-weight: bold; }
</style>
</head>
<body>
<header class="header">
<h1>The Lab</h1>
</header>
<div class="grid">
<div class="card">
<h3>Sessions</h3>
<div class="value" id="sessions">2</div>
</div>
<div class="card">
<h3>Subagents</h3>
<div class="value" id="subagents">0</div>
</div>
<div class="card">
<h3>Model</h3>
<div class="value" id="model">grok-4-1-fast</div>
</div>
<div class="card">
<h3>Tokens</h3>
<div class="value" id="tokens">Low</div>
</div>
<div class="card">
<h3>Status</h3>
<div class="value">Live</div>
</div>
</div>
<script>
const data = {sessions:2, subagents:0, model:'grok-4-1-fast', tokens:'Low'};
setInterval(() => {
  document.getElementById('sessions').textContent = Math.floor(Math.random()*10)+1;
}, 3000);
</script>
</body>
</html>
